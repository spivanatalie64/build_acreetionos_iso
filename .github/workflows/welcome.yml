name: Welcome new contributors
on:
  issues:
    types: [opened]
  pull_request_target:
    types: [opened]

jobs:
  welcome:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
      - uses: actions/first-interaction@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          issue-message: |
            Welcome! 🎉 Thank you for opening your first issue in this repository!
            Please make sure to follow our guidelines and provide as much detail as possible.
          pr-message: |
            Welcome! 🎉 Thank you for your first pull request!
            A maintainer will review it as soon as possible.
