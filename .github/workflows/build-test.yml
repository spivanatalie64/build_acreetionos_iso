name: Build & Test

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:
  push:
    branches: [main]
  repository_dispatch:
    types: [build-trigger]

env:
  CINNAMON_X11_REPO: https://github.com/acreetionos-code/acreetionos.git
  CINNAMON_XLIBRE_REPO: https://github.com/acreetionos-code/acreetionos-xlibre.git

jobs:
  build-cinnamon-x11:
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
      options: --privileged
    timeout-minutes: 180
    steps:
      - name: Install deps
        run: |
          pacman -Sy --noconfirm archlinux-keyring
          pacman -S --noconfirm --needed archiso squashfs-tools dosfstools erofs-utils mtools xorriso libarchive grub edk2-shell git
      - uses: actions/checkout@v4
      - name: Clone and build cinnamon-x11
        run: |
          mkdir -p _official_builds
          git clone $CINNAMON_X11_REPO _official_builds/cinnamon-x11
          cd _official_builds/cinnamon-x11
          if [ -f build.sh ]; then
            chmod +x build.sh
            ./build.sh 2>&1
          fi
      - name: Test ISO
        run: |
          chmod +x test-iso.sh
          ./test-iso.sh cinnamon-x11
      - name: Upload ISO
        uses: actions/upload-artifact@v4
        with:
          name: cinnamon-x11-iso
          path: _official_builds/cinnamon-x11/out/*.iso
          retention-days: 7
      - name: Upload test log
        uses: actions/upload-artifact@v4
        with:
          name: test-log-x11
          path: test-results.log
          retention-days: 30

  build-cinnamon-xlibre:
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
      options: --privileged
    timeout-minutes: 180
    steps:
      - name: Install deps
        run: |
          pacman -Sy --noconfirm archlinux-keyring
          pacman -S --noconfirm --needed archiso squashfs-tools dosfstools erofs-utils mtools xorriso libarchive grub edk2-shell git
      - uses: actions/checkout@v4
      - name: Clone and build cinnamon-xlibre
        run: |
          mkdir -p _official_builds
          git clone $CINNAMON_XLIBRE_REPO _official_builds/cinnamon-xlibre
          cd _official_builds/cinnamon-xlibre
          if [ -f build.sh ]; then
            chmod +x build.sh
            ./build.sh 2>&1
          fi
      - name: Test ISO
        run: |
          chmod +x test-iso.sh
          ./test-iso.sh cinnamon-xlibre
      - name: Upload ISO
        uses: actions/upload-artifact@v4
        with:
          name: cinnamon-xlibre-iso
          path: _official_builds/cinnamon-xlibre/out/*.iso
          retention-days: 7
      - name: Upload test log
        uses: actions/upload-artifact@v4
        with:
          name: test-log-xlibre
          path: test-results.log
          retention-days: 30