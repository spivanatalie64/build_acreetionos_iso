name: Build & Test

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:
  push:
    branches: [main]
  repository_dispatch:
    types: [build-trigger]

jobs:
  build-cinnamon-x11:
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
      options: --privileged
    timeout-minutes: 180
    steps:
      - name: Install deps
        run: |
          pacman -Sy --noconfirm archlinux-keyring
          pacman -S --noconfirm --needed archiso squashfs-tools dosfstools erofs-utils mtools xorriso libarchive grub edk2-shell git
      - name: Checkout pipeline
        uses: actions/checkout@v4
        with:
          path: pipeline
      - name: Clone and build cinnamon-x11
        run: |
          cd pipeline
          git clone https://github.com/acreetionos-code/acreetionos.git _official_builds/cinnamon-x11
          cd _official_builds/cinnamon-x11
          if [ -f build.sh ]; then
            chmod +x build.sh
            ./build.sh
          fi
      - name: Test ISO
        run: |
          cd pipeline
          chmod +x test-iso.sh
          ./test-iso.sh cinnamon-x11
      - name: Upload ISO
        uses: actions/upload-artifact@v4
        with:
          name: cinnamon-x11-iso
          path: _official_builds/cinnamon-x11/out/*.iso
          retention-days: 7

  build-cinnamon-xlibre:
    runs-on: ubuntu-latest
    needs: [build-cinnamon-x11]
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y xorriso genisoimage
      - name: Clone and build cinnamon-xlibre
        run: |
          git clone https://github.com/acreetionos-code/acreetionos-xlibre.git _official_builds/cinnamon-xlibre
          cd _official_builds/cinnamon-xlibre
          if [ -f build.sh ]; then
            chmod +x build.sh
            ./build.sh
          fi
      - name: Test ISO
        run: |
          chmod +x test-iso.sh
          ./test-iso.sh cinnamon-xlibre
      - name: Upload ISO
        uses: actions/upload-artifact@v4
        with:
          name: cinnamon-xlibre-iso
          path: _official_builds/cinnamon-xlibre/out/*.iso
          retention-days: 7

  test:
    runs-on: ubuntu-latest
    needs: [build-cinnamon-x11, build-cinnamon-xlibre]
    if: always()
    steps:
      - uses: actions/checkout@v4
      - name: Download all ISOs
        uses: actions/download-artifact@v4
      - name: Run ISO tests
        run: |
          chmod +x test-iso.sh
          ./test-iso.sh
      - name: Upload test results
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results.log
          retention-days: 30