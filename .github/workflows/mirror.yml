name: Mirror to GitLab

on: [push]

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up SSH for GitLab
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.GITLAB_SSH_KEY }}

      - name: Add GitLab to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p 2499 gitlab.acreetionos.org >> ~/.ssh/known_hosts

      - name: Push to GitLab
        run: |
          git remote add gitlab "ssh://git@gitlab.acreetionos.org:2499/acreetionos-code/build_acreetionos_iso.git"
          git push --force --all gitlab
          git push --force --tags gitlab
