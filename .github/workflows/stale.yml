name: Mark stale issues and PRs
on:
  schedule:
    - cron: '30 1 * * *'
  workflow_dispatch:

jobs:
  stale:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
      - uses: actions/stale@v9
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          stale-issue-message: 'This issue has been automatically marked as stale because it has not had recent activity. It will be closed if no further activity occurs. Thank you for your contributions.'
          stale-pr-message: 'This PR has been automatically marked as stale because it has not had recent activity. It will be closed if no further activity occurs.'
          days-before-stale: 60
          days-before-close: 14
          exempt-issue-labels: 'pinned,security,enhancement,planned'
          exempt-pr-labels: 'pinned,security,work-in-progress'
          stale-issue-label: 'stale'
          stale-pr-label: 'stale'
